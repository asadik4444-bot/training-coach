name: TrainingCoach

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settingGroups:
  SharedTargetSettings:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_NSSupportsLiveActivities: YES
    INFOPLIST_KEY_NSHealthShareUsageDescription: Read weight, RHR, and sleep to cross-check Whoop data
    INFOPLIST_KEY_UIAppFonts:
      - FiraSans-Regular.ttf
      - FiraSans-Medium.ttf
      - FiraSans-SemiBold.ttf
      - FiraSans-Bold.ttf
      - FiraCode-Regular.ttf
      - FiraCode-Medium.ttf

targets:
  TrainingCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/TrainingCoach
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: TrainingCoachWidget
        embed: true
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
      - sdk: HealthKit.framework
    settings:
      groups:
        - SharedTargetSettings
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asadbek.trainingcoach
        PRODUCT_NAME: TrainingCoach
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: TrainingCoach.xcodeproj/TrainingCoach.entitlements
      properties:
        com.apple.developer.healthkit: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.asadbek.trainingcoach

  TrainingCoachWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/TrainingCoachWidget
      - path: Resources
        buildPhase: resources
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
      - sdk: HealthKit.framework
    settings:
      groups:
        - SharedTargetSettings
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asadbek.trainingcoach.widget
        PRODUCT_NAME: TrainingCoachWidget
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/TrainingCoachWidget/Info.plist
    entitlements:
      path: TrainingCoach.xcodeproj/TrainingCoachWidget.entitlements
      properties:
        com.apple.developer.healthkit: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.asadbek.trainingcoach
